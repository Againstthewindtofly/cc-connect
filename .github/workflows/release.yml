name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Determine version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms (no_web)
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          PLATFORMS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
          for platform in $PLATFORMS; do
            GOOS=$(echo $platform | cut -d/ -f1)
            GOARCH=$(echo $platform | cut -d/ -f2)
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            OUT="dist/cc-connect-${{ steps.version.outputs.VERSION }}-${GOOS}-${GOARCH}${EXT}"
            echo "Building $OUT..."
            GOOS=$GOOS GOARCH=$GOARCH go build \
              -tags 'no_web' \
              -ldflags "-X core.VersionInfo=${{ steps.version.outputs.VERSION }} -X core.CurrentVersion=${{ steps.version.outputs.VERSION }}" \
              -o "$OUT" ./cmd/cc-connect
          done

      - name: Package archives
        run: |
          cd dist
          for f in cc-connect-*; do
            case "$f" in
              *.exe) zip "${f%.exe}.zip" "$f" ;;
              *)     tar czf "$f.tar.gz" "$f" ;;
            esac
          done
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
